<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouxe Representações - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .admin-hidden { display: none; }
        .product-card { transition: all 0.3s ease; border-radius: 1.5rem; overflow: hidden; background: white; border: 1px solid #e2e8f0; height: 100%; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .product-img { width: 100%; height: 200px; object-fit: contain; background: #fff; padding: 10px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white shadow-xl border-b-4 border-blue-600 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-6 flex justify-between items-center">
            <div class="flex items-center gap-5 cursor-pointer select-none" onclick="handleAdminClick()">
                <div class="bg-white p-2 rounded-xl w-16 h-16 flex items-center justify-center overflow-hidden">
                    <img src="logo.jpg" onerror="this.src='https://via.placeholder.com/150?text=OUXE';" alt="Logo" class="max-h-full object-contain">
                </div>
                <h1 class="text-2xl font-extrabold tracking-tighter uppercase italic">OUXE <span class="text-blue-500">REPRESENTAÇÕES</span></h1>
            </div>
            <button class="bg-blue-600 px-6 py-3 rounded-2xl flex items-center gap-3">
                <i data-lucide="shopping-cart"></i>
                <span id="cartCount" class="font-black text-xl">0</span>
            </button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-10 w-full">
        
        <section id="adminPanel" class="admin-hidden bg-white border-4 border-amber-400 p-8 rounded-[2.5rem] mb-12 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-black italic uppercase text-slate-700">Atualizador de Banco de Dados</h3>
                <button onclick="exitAdmin()" class="bg-red-500 text-white px-4 py-1 rounded-lg text-xs font-bold uppercase">Fechar</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-blue-50 p-6 rounded-[2rem] border-2 border-blue-100">
                    <h4 class="font-black text-blue-700 mb-4 uppercase text-sm italic">Passo 1: Vincular Foto</h4>
                    <div class="space-y-4">
                        <input type="text" id="imgTargetCod" placeholder="Código do Produto" class="w-full p-4 rounded-xl border-none outline-none font-bold">
                        <input type="file" id="fileInput" accept="image/*" class="block w-full text-xs">
                        <button onclick="processUpload()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl hover:bg-blue-700 transition-all uppercase italic">
                            Atualizar na Tela
                        </button>
                    </div>
                </div>

                <div class="bg-emerald-50 p-6 rounded-[2rem] border-2 border-emerald-100">
                    <h4 class="font-black text-emerald-700 mb-4 uppercase text-sm italic">Passo 2: Gerar Novo Banco de Dados</h4>
                    <p class="text-[10px] text-slate-500 mb-4 font-bold uppercase">Após ver a foto na tela, clique abaixo para gerar a lista completa e salvar.</p>
                    <button onclick="exportFullDatabase()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl hover:bg-emerald-700 transition-all uppercase italic flex items-center justify-center gap-2">
                        <i data-lucide="refresh-cw"></i> Gerar Lista Atualizada
                    </button>
                </div>

                <div class="lg:col-span-2">
                    <p class="font-bold text-xs text-slate-600 mb-2 uppercase italic">Substitua todo o campo "let produtos = [...]" do seu arquivo por este código:</p>
                    <textarea id="outputCode" readonly class="w-full p-6 font-mono text-[9px] bg-slate-900 text-emerald-400 rounded-3xl min-h-[150px] outline-none border-none shadow-2xl"></textarea>
                    <button onclick="copyCode()" class="mt-4 w-full bg-slate-800 text-white font-black py-4 rounded-2xl hover:bg-black transition-all flex items-center justify-center gap-3 uppercase">
                        <i data-lucide="copy"></i> Copiar Banco de Dados Completo
                    </button>
                </div>
            </div>
        </section>

        <div class="mb-10 relative group">
            <input type="text" id="searchInput" oninput="filterProducts()" placeholder="Buscar..." class="w-full p-6 pl-16 rounded-3xl border-none shadow-xl text-xl outline-none font-bold uppercase">
            <i data-lucide="search" class="absolute left-6 top-6 text-slate-300"></i>
        </div>

        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </main>

            { cod: "2289", desc: "VIOLETA GENCIANA 30ML", forn: "KRIFF", por: "5.46", img: "" }
        ];

        function processUpload() {
            const targetCod = document.getElementById('imgTargetCod').value.trim();
            const file = document.getElementById('fileInput').files[0];
            if(!targetCod || !file) return alert("Preencha o código e escolha a foto!");

            const reader = new FileReader();
            reader.onload = (e) => {
                const p = produtos.find(x => x.cod === targetCod);
                if(p) {
                    p.img = e.target.result;
                    renderProducts();
                    alert("Foto atualizada na tela! Agora use o 'Passo 2' para gerar o código final.");
                } else alert("Código não encontrado!");
            };
            reader.readAsDataURL(file);
        }

        // FUNÇÃO QUE GERA A LISTA COMPLETA
        function exportFullDatabase() {
            const json = JSON.stringify(produtos, null, 4);
            const formatted = `let produtos = ${json};`;
            document.getElementById('outputCode').value = formatted;
        }

        function renderProducts(data = produtos) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            data.forEach(p => {
                grid.innerHTML += `
                <div class="product-card p-4">
                    <img src="${p.img || 'https://via.placeholder.com/300x200?text=SEM+FOTO'}" class="product-img">
                    <div class="py-4 flex-grow">
                        <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded uppercase">${p.forn}</span>
                        <h3 class="font-bold text-slate-800 text-base mt-2 mb-1 h-12 overflow-hidden uppercase">${p.desc}</h3>
                        <p class="text-xs text-slate-400 font-mono">CÓD: ${p.cod}</p>
                    </div>
                    <div class="pt-4 border-t flex justify-between items-center">
                        <p class="text-2xl font-black text-emerald-600">R$ ${p.por}</p>
                        <button class="bg-slate-900 text-white p-2 rounded-xl"><i data-lucide="plus"></i></button>
                    </div>
                </div>`;
            });
            lucide.createIcons();
        }

        function handleAdminClick() {
            clickCount++;
            if (clickCount === 7) {
                const senha = prompt("SENHA:");
                if (btoa(senha) === "bHQ4OGJhMTQ=") {
                    document.getElementById('adminPanel').classList.remove('admin-hidden');
                }
                clickCount = 0;
            }
        }

        function copyCode() {
            const area = document.getElementById('outputCode'); area.select();
            document.execCommand('copy'); alert("Lista completa copiada!");
        }

        function exitAdmin() { document.getElementById('adminPanel').classList.add('admin-hidden'); }
        function filterProducts() {
            const t = document.getElementById('searchInput').value.toLowerCase();
            renderProducts(produtos.filter(p => p.desc.toLowerCase().includes(t) || p.cod.includes(t)));
        }

        renderProducts();
    </script>
</body>
</html>
